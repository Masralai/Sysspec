name: Docker Build Check

on:
    push:
        branches: [ "master" ]

jobs:
    docker-build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3
            - name: Build Image
              uses: docker/build-push-action@v5
              with:
                context: .
                file: ./Dockerfile
                push: false
                tags: sysspec:latest
                cache-from: type=gha
                cache-to: type=gha,mode=max